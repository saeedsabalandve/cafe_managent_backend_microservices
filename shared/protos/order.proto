// shared/protos/order.proto
// #grpc-service-definition #order-operations

syntax = "proto3";

package cafe.order;

option go_package = "order-service/proto/order";

// ============================================
// Order Service
// ============================================
service OrderService {
  // Create a new order
  rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
  
  // Get order by ID
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
  
  // Update order status
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (OrderResponse);
  
  // Get active orders for kitchen display
  rpc GetActiveOrders(GetActiveOrdersRequest) returns (stream OrderResponse);
  
  // Cancel an order
  rpc CancelOrder(CancelOrderRequest) returns (OrderResponse);
}

// ============================================
// Messages
// ============================================
message CreateOrderRequest {
  string cafe_id = 1;
  int32 table_number = 2;
  repeated OrderItem items = 3;
  string notes = 4;
  string created_by = 5;
}

message OrderItem {
  string menu_item_id = 1;
  string name = 2;
  int32 quantity = 3;
  double unit_price = 4;
  repeated Modifier modifiers = 5;
  string special_notes = 6;
}

message Modifier {
  string modifier_id = 1;
  string name = 2;
  double price_delta = 3;
}

message GetOrderRequest {
  string order_id = 1;
}

message GetActiveOrdersRequest {
  string cafe_id = 1;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  OrderStatus new_status = 2;
  string changed_by = 3;
}

message CancelOrderRequest {
  string order_id = 1;
  string cancelled_by = 2;
  string reason = 3;
}

message OrderResponse {
  string id = 1;
  string cafe_id = 2;
  int32 table_number = 3;
  repeated OrderItem items = 4;
  OrderStatus status = 5;
  double total_amount = 6;
  string notes = 7;
  string created_by = 8;
  string created_at = 9;
  string updated_at = 10;
  repeated StatusChange status_history = 11;
}

message StatusChange {
  OrderStatus from = 1;
  OrderStatus to = 2;
  string changed_by = 3;
  string timestamp = 4;
}

enum OrderStatus {
  NEW = 0;
  PREPARING = 1;
  READY = 2;
  SERVED = 3;
  COMPLETED = 4;
  CANCELLED = 5;
}
